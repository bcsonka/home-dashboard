<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <!-- Soft Drop Shadow for Depth (Meteocons aesthetic) -->
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#041246" flood-opacity="0.12"/>
        </filter>
        
        <!-- Smooth Gradients -->
        <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#e2e8f0"/>
        </linearGradient>
        
        <linearGradient id="snowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#7dd3fc"/>
            <stop offset="100%" stop-color="#0284c7"/>
        </linearGradient>

        <linearGradient id="driftBackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f8fafc"/>
            <stop offset="100%" stop-color="#bae6fd"/>
        </linearGradient>

        <linearGradient id="driftFrontGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#e0f2fe"/>
        </linearGradient>

        <linearGradient id="stickRed" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ef4444"/>
            <stop offset="100%" stop-color="#b91c1c"/>
        </linearGradient>

        <!-- Measuring Stick Clip Boundary -->
        <clipPath id="stickClip">
            <rect x="48" y="12" width="6" height="52" rx="2.5"/>
        </clipPath>

        <!-- Bubbly Snowflake Template -->
        <g id="snowflake">
            <path d="M0,-3.5 L0,3.5 M-3,-1.75 L3,1.75 M-3,1.75 L3,-1.75" 
                  stroke="url(#snowGrad)" stroke-width="1.6" stroke-linecap="round"/>
        </g>
    </defs>

    <!-- 1. BACK SNOW DRIFT -->
    <path d="M -5 85 L -5 36 Q 20 32 40 36 T 70 36 L 70 85 Z" fill="url(#driftBackGrad)">
        <animateTransform attributeName="transform" type="translate" 
            values="0 22; 0 0; 0 0; 0 22" 
            keyTimes="0; 0.4; 0.85; 1" 
            calcMode="spline" keySplines="0.4 0 0.2 1; 0 0 1 1; 0.4 0 1 1" 
            dur="10s" repeatCount="indefinite" />
    </path>

    <!-- 2. MEASURING STAKE -->
    <g filter="url(#softShadow)">
        <g clip-path="url(#stickClip)">
            <!-- Stake Base -->
            <rect x="48" y="12" width="6" height="52" fill="#f8fafc"/>
            <!-- High-Contrast Ticks -->
            <rect x="48" y="16" width="6" height="4" fill="url(#stickRed)"/>
            <rect x="48" y="24" width="6" height="4" fill="url(#stickRed)"/>
            <rect x="48" y="32" width="6" height="4" fill="url(#stickRed)"/>
            <rect x="48" y="40" width="6" height="4" fill="url(#stickRed)"/>
            <rect x="48" y="48" width="6" height="4" fill="url(#stickRed)"/>
            <rect x="48" y="56" width="6" height="4" fill="url(#stickRed)"/>
        </g>
    </g>

    <!-- 3. FALLING SNOWFLAKES -->
    <g>
        <!-- Flake 1 (Left) -->
        <g opacity="0">
            <animateTransform attributeName="transform" type="translate" values="18,15; 18,55" dur="2.4s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0; 1; 1; 0" dur="2.4s" keyTimes="0; 0.15; 0.8; 1" repeatCount="indefinite" />
            <g>
                <animateTransform attributeName="transform" type="rotate" values="0; 180" dur="2.4s" repeatCount="indefinite" />
                <use href="#snowflake"/>
            </g>
        </g>

        <!-- Flake 2 (Center-ish, smaller) -->
        <g opacity="0">
            <animateTransform attributeName="transform" type="translate" values="28,16; 28,53" begin="0.8s" dur="2.6s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0; 1; 1; 0" begin="0.8s" dur="2.6s" keyTimes="0; 0.15; 0.8; 1" repeatCount="indefinite" />
            <g>
                <animateTransform attributeName="transform" type="rotate" values="0; -180" begin="0.8s" dur="2.6s" repeatCount="indefinite" />
                <g transform="scale(0.8)">
                    <use href="#snowflake"/>
                </g>
            </g>
        </g>
        
        <!-- Flake 3 (Right) -->
        <g opacity="0">
            <animateTransform attributeName="transform" type="translate" values="38,17; 38,54" begin="1.4s" dur="2s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0; 1; 1; 0" begin="1.4s" dur="2s" keyTimes="0; 0.15; 0.8; 1" repeatCount="indefinite" />
            <g>
                <animateTransform attributeName="transform" type="rotate" values="0; 180" begin="1.4s" dur="2s" repeatCount="indefinite" />
                <g transform="scale(0.9)">
                    <use href="#snowflake"/>
                </g>
            </g>
        </g>
    </g>

    <!-- 4. FRONT SNOW DRIFT -->
    <g filter="url(#softShadow)">
        <path d="M -5 85 L -5 42 Q 15 36 35 41 T 70 41 L 70 85 Z" fill="url(#driftFrontGrad)">
            <animateTransform attributeName="transform" type="translate" 
                values="0 22; 0 0; 0 0; 0 22" 
                keyTimes="0; 0.4; 0.85; 1" 
                calcMode="spline" keySplines="0.4 0 0.2 1; 0 0 1 1; 0.4 0 1 1" 
                dur="10s" repeatCount="indefinite" />
        </path>
    </g>

    <!-- 5. FLUFFY CLOUD -->
    <g filter="url(#softShadow)">
        <g transform="translate(4, -14) scale(0.8)">
            <g>
                <animateTransform attributeName="transform" type="translate" values="0,0; 0,2; 0,0" dur="4s" repeatCount="indefinite" />
                <path d="M19,40 c-3.3,0-6-2.7-6-6 c0-3.3,2.7-6,6-6 c0.4,0,0.8,0,1.2,0.1 
                         C21.7,24,25.9,20,31,20 c5.1,0,9.3,4,10.8,8.1 c0.4-0.1,0.8-0.1,1.2-0.1 
                         c3.3,0,6,2.7,6,6 c0,3.3-2.7,6-6,6 H19 z" 
                      fill="url(#cloudGrad)" />
            </g>
        </g>
    </g>
</svg>