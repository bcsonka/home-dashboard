<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%" role="img" aria-label="Barometric pressure gauge">
    <defs>
        <filter id="needle-shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.5" />
        </filter>
        <!-- Embedded CSS for the "Rapid" pulsing animation -->
        <style>
            @keyframes rapidPulse {
                0%, 100% { opacity: 0.2; }
                50% { opacity: 1; }
            }
            .rapid-anim {
                animation: rapidPulse 1s ease-in-out infinite;
            }
        </style>
    </defs>

    <!-- Main Outer Casing (Perfect circle, NO hanging tab, bright border) -->
    <circle cx="32" cy="32" r="28" fill="rgba(0, 0, 0, 0.4)" stroke="#cbd5e1" stroke-width="2.5" />
    
    <!-- Inner Depth Ring -->
    <circle cx="32" cy="32" r="25.5" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.15" />

    <!-- Bottom Dashed Scale -->
    <path d="M 52 32 A 20 20 0 0 1 12 32" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="3 6" stroke-linecap="round" />

    <!-- Colored Pressure Zones -->
    <!-- Low / Rain (Cyan) -->
    <path d="M 12 32 A 20 20 0 0 1 22 14.68" fill="none" stroke="#38bdf8" stroke-width="3.5" stroke-linecap="round" />
    <!-- Normal / Change (Slate) -->
    <path d="M 25.16 13.21 A 20 20 0 0 1 38.84 13.21" fill="none" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" />
    <!-- High / Fair (Amber) -->
    <path d="M 42 14.68 A 20 20 0 0 1 52 32" fill="none" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round" />

    <!-- Minimalist Tick Marks -->
    <g stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round">
        <line x1="32" y1="16" x2="32" y2="19" transform="rotate(-90 32 32)" />
        <line x1="32" y1="16" x2="32" y2="19" transform="rotate(-60 32 32)" />
        <line x1="32" y1="16" x2="32" y2="19" transform="rotate(-30 32 32)" />
        <line x1="32" y1="16" x2="32" y2="19" transform="rotate(0 32 32)" />
        <line x1="32" y1="16" x2="32" y2="19" transform="rotate(30 32 32)" />
        <line x1="32" y1="16" x2="32" y2="19" transform="rotate(60 32 32)" />
        <line x1="32" y1="16" x2="32" y2="19" transform="rotate(90 32 32)" />
    </g>

    <!-- Label -->
    <text x="32" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="5" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="0.5">inHg</text>

    <!-- ZONE-MATCHED & ANIMATED TREND INDICATORS -->
    <g stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        
        <!-- Steady / Normal Rising: Single Amber Chevron -->
        <path id="trend-rising" d="M 29 49.5 L 32 46.5 L 35 49.5" fill="none" stroke="#fbbf24" display="none" />
        
        <!-- Normal Falling: Single Cyan Chevron -->
        <path id="trend-falling" d="M 29 46.5 L 32 49.5 L 35 46.5" fill="none" stroke="#38bdf8" display="none" />
        
        <!-- Rapid Rising: Double Amber Chevron. Top arrow pulses. -->
        <g id="trend-rising-rapid" stroke="#fbbf24" display="none">
            <path d="M 29 50 L 32 47 L 35 50" fill="none" />
            <path class="rapid-anim" d="M 29 46 L 32 43 L 35 46" fill="none" />
        </g>
        
        <!-- Rapid Falling: Double Cyan Chevron. Bottom arrow pulses. -->
        <g id="trend-falling-rapid" stroke="#38bdf8" display="none">
            <path d="M 29 46 L 32 49 L 35 46" fill="none" />
            <path class="rapid-anim" d="M 29 50 L 32 53 L 35 50" fill="none" />
        </g>

    </g>

    <!-- Dynamic Needle Group -->
    <g id="needle-group" filter="url(#needle-shadow)" transform="rotate(0 32 32)">
        <line x1="32" y1="36" x2="32" y2="20" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" />
        <circle cx="32" cy="32" r="3.5" fill="#f8fafc" />
        <circle cx="32" cy="32" r="2.5" fill="#0f172a" />
    </g>

    <!-- Glass Glare / Reflection -->
    <path d="M 36 9.4 A 23 23 0 0 1 51.9 20.5" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.15" />
</svg>