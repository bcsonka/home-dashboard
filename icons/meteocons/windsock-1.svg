<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <!-- Soft Drop Shadow for Depth -->
        <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#041246" flood-opacity="0.15"/>
        </filter>
        
        <!-- Pole Gradient (Smooth Silver) -->
        <linearGradient id="poleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#cbd5e1"/>
            <stop offset="50%" stop-color="#f8fafc"/>
            <stop offset="100%" stop-color="#94a3b8"/>
        </linearGradient>

        <!-- Inner Hole Gradient (Fills the hoop with receding 3D depth) -->
        <linearGradient id="innerHoleGrad" x1="14" y1="0" x2="22" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ef4444"/>
            <stop offset="40%" stop-color="#dc2626"/>
            <stop offset="100%" stop-color="#7f1d1d"/>
        </linearGradient>

        <!-- DIAGONAL ANTI-ALIASED 5-STRIPE GRADIENT -->
        <linearGradient id="lightWindStripe" x1="18" y1="18" x2="35" y2="49" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ef4444"/>
            <stop offset="19.5%" stop-color="#ef4444"/>
            <stop offset="20.5%" stop-color="#f8fafc"/>
            <stop offset="39.5%" stop-color="#f8fafc"/>
            <stop offset="40.5%" stop-color="#ef4444"/>
            <stop offset="59.5%" stop-color="#ef4444"/>
            <stop offset="60.5%" stop-color="#f8fafc"/>
            <stop offset="79.5%" stop-color="#f8fafc"/>
            <stop offset="80.5%" stop-color="#ef4444"/>
            <stop offset="100%" stop-color="#ef4444"/>
        </linearGradient>

        <!-- ANGLED 3D FABRIC SHADING -->
        <linearGradient id="lightWindShine" x1="1" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
            <stop offset="0%" stop-color="#000000" stop-opacity="0.25"/>
            <stop offset="25%" stop-color="#ffffff" stop-opacity="0.4"/>
            <stop offset="60%" stop-color="#000000" stop-opacity="0.0"/>
            <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
        </linearGradient>
    </defs>

    <!-- MAIN WINDSOCK ASSEMBLY -->
    <g filter="url(#softShadow)">
        
        <!-- Pole Base Shadow -->
        <ellipse cx="14" cy="56" rx="6" ry="1.5" fill="#041246" opacity="0.2"/>

        <!-- Silver Pole -->
        <rect x="12" y="14" width="4" height="42" rx="2" fill="url(#poleGrad)"/>
        <!-- Pole Top Cap -->
        <circle cx="14" cy="14" r="3" fill="url(#poleGrad)"/>
        <!-- Mounting Arm -->
        <rect x="14" y="16.5" width="4" height="3" fill="#94a3b8"/>

        <!-- Animated Windsock -->
        <g>
            <!-- Slow structural lift/bob mimicking intermittent light breeze -->
            <animateTransform 
                attributeName="transform" 
                type="rotate" 
                values="-1 18 18; 3 18 18; -1 18 18" 
                dur="3.5s" 
                calcMode="spline" 
                keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" 
                repeatCount="indefinite"/>
            
            <!-- Mounting Ring & Inside Wall -->
            <ellipse cx="18" cy="18" rx="4" ry="9" fill="url(#innerHoleGrad)" stroke="#94a3b8" stroke-width="2"/>

            <!-- 
                NEW: Dark Inner Tail Hole
                Drawn behind the main fabric. It forms the back inner wall of the tube, 
                giving the realistic illusion of an open hole facing down-right.
            -->
            <path fill="#450a0a">
                <animate attributeName="d"
                    values="
                        M 38 48 A 3.5 2 -30 0 0 32 50 A 3.5 2 -30 0 1 38 48 Z;
                        M 39 46 A 3.5 2 -30 0 0 33 48 A 3.5 2 -30 0 1 39 46 Z;
                        M 37 50 A 3.5 2 -30 0 0 31 52 A 3.5 2 -30 0 1 37 50 Z;
                        M 38.5 47.5 A 3.5 2 -30 0 0 32.5 49.5 A 3.5 2 -30 0 1 38.5 47.5 Z;
                        M 38 48 A 3.5 2 -30 0 0 32 50 A 3.5 2 -30 0 1 38 48 Z
                    "
                    dur="3s"
                    repeatCount="indefinite" />
            </path>

            <!-- FABRIC LAYER - BASE STRIPES -->
            <path fill="url(#lightWindStripe)">
                <animate attributeName="d"
                    values="
                        M 18 10 C 30 10, 36 22, 38 48 A 3.5 2 -30 0 1 32 50 C 28 36, 24 26, 18 26 A 3 8 0 0 0 18 10 Z;
                        M 18 10 C 32 9.5, 38 21, 39 46 A 3.5 2 -30 0 1 33 48 C 29 35, 25 25.5, 18 26 A 3 8 0 0 0 18 10 Z;
                        M 18 10 C 29 10.5, 34 23, 37 50 A 3.5 2 -30 0 1 31 52 C 27 38, 23 26.5, 18 26 A 3 8 0 0 0 18 10 Z;
                        M 18 10 C 31 10, 37 21.5, 38.5 47.5 A 3.5 2 -30 0 1 32.5 49.5 C 28.5 35.5, 24.5 26, 18 26 A 3 8 0 0 0 18 10 Z;
                        M 18 10 C 30 10, 36 22, 38 48 A 3.5 2 -30 0 1 32 50 C 28 36, 24 26, 18 26 A 3 8 0 0 0 18 10 Z
                    "
                    dur="3s"
                    repeatCount="indefinite" />
            </path>

            <!-- FABRIC LAYER - 3D SHADING OVERLAY -->
            <path fill="url(#lightWindShine)">
                <animate attributeName="d"
                    values="
                        M 18 10 C 30 10, 36 22, 38 48 A 3.5 2 -30 0 1 32 50 C 28 36, 24 26, 18 26 A 3 8 0 0 0 18 10 Z;
                        M 18 10 C 32 9.5, 38 21, 39 46 A 3.5 2 -30 0 1 33 48 C 29 35, 25 25.5, 18 26 A 3 8 0 0 0 18 10 Z;
                        M 18 10 C 29 10.5, 34 23, 37 50 A 3.5 2 -30 0 1 31 52 C 27 38, 23 26.5, 18 26 A 3 8 0 0 0 18 10 Z;
                        M 18 10 C 31 10, 37 21.5, 38.5 47.5 A 3.5 2 -30 0 1 32.5 49.5 C 28.5 35.5, 24.5 26, 18 26 A 3 8 0 0 0 18 10 Z;
                        M 18 10 C 30 10, 36 22, 38 48 A 3.5 2 -30 0 1 32 50 C 28 36, 24 26, 18 26 A 3 8 0 0 0 18 10 Z
                    "
                    dur="3s"
                    repeatCount="indefinite" />
            </path>
            
            <!-- Front Lip of the main Mount Hoop -->
            <path d="M 18 10 A 3 8 0 0 0 18 26" fill="none" stroke="#fca5a5" stroke-width="1.2"/>

            <!-- 
                NEW: Tail Hem Highlight 
                A subtle, thin light stroke overlaid on the trailing edge to mimic 
                physical fabric catching the light.
            -->
            <path fill="none" stroke="#fca5a5" stroke-width="0.8" opacity="0.8">
                <animate attributeName="d"
                    values="
                        M 38 48 A 3.5 2 -30 0 1 32 50;
                        M 39 46 A 3.5 2 -30 0 1 33 48;
                        M 37 50 A 3.5 2 -30 0 1 31 52;
                        M 38.5 47.5 A 3.5 2 -30 0 1 32.5 49.5;
                        M 38 48 A 3.5 2 -30 0 1 32 50
                    "
                    dur="3s"
                    repeatCount="indefinite" />
            </path>
        </g>
    </g>
</svg>