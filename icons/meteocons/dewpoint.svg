<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
	<defs>
		<!-- Water Gradient -->
		<linearGradient id="waterGrad" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#60a5fa" stop-opacity="0.9"/>
			<stop offset="0.5" stop-color="#3b82f6" stop-opacity="0.9"/>
			<stop offset="1" stop-color="#2563eb" stop-opacity="0.9"/>
		</linearGradient>

        <!-- Leaf Gradient -->
        <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#4ade80"/>
            <stop offset="1" stop-color="#16a34a"/>
        </linearGradient>
	</defs>

    <!-- CENTER GROUP: Scaled 0.7 -->
    <g transform="translate(9.6, 9.6) scale(0.7)">
    
        <!-- LEAF OBJECT -->
        <g transform-origin="10 30">
            <!-- Leaf Animation: Sway -->
            <animateTransform attributeName="transform" type="rotate" values="0; 3; 0" dur="4s" repeatCount="indefinite" />
            
            <!-- 1. Base Leaf Body -->
            <path d="M4 28 Q 32 10 60 38 Q 32 60 4 28 Z" fill="url(#leafGrad)" />
            
            <!-- 2. Leaf Fold Shadow (Bottom Half) -->
            <!-- Adds depth by darkening the lower side of the vein -->
            <path d="M4 28 Q 30 25 50 35 Q 32 60 4 28 Z" fill="#000000" opacity="0.15" />

            <!-- 3. Veins -->
            <g stroke="#14532d" stroke-width="0.8" fill="none" opacity="0.3">
                <!-- Center Vein -->
                <path d="M4 28 Q 30 25 50 35" stroke-width="1.5" />
                
                <!-- Top Branching Veins -->
                <path d="M20 26 Q 25 20 30 16" />
                <path d="M35 29 Q 40 22 45 18" />
                
                <!-- Bottom Branching Veins -->
                <path d="M18 27 Q 22 35 26 42" />
                <path d="M32 30 Q 36 38 40 45" />
            </g>

            <!-- 4. Top Edge Highlight (Catches light) -->
            <path d="M4 28 Q 32 10 60 38" fill="none" stroke="#bbf7d0" stroke-width="1" opacity="0.6" />
            
            <!-- Leaf Stem -->
            <path d="M4 28 L -2 30" stroke="#16a34a" stroke-width="2" stroke-linecap="round" />

            <!-- MAIN DEW DROP (Smaller) -->
            <path fill="url(#waterGrad)" d="M49 29 Q 42 39 43 44 A 6 6 0 0 0 53 41 Q 54 32 49 29 Z">
                <animateTransform attributeName="transform" type="scale" values="1 1; 1.05 0.95; 1 1" dur="4s" repeatCount="indefinite" additive="sum" transform-origin="48 38"/>
            </path>
            
            <!-- Drop Highlight -->
            <path d="M46 34 Q 44 37 45 40" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5">
                 <animateTransform attributeName="transform" type="scale" values="1 1; 1.05 0.95; 1 1" dur="4s" repeatCount="indefinite" additive="sum" transform-origin="48 38"/>
            </path>

            <!-- ROLLING DROPLET -->
            <circle r="3" fill="url(#waterGrad)" opacity="0.9">
                <animateMotion path="M15 26 Q 25 24 38 34" dur="3s" repeatCount="indefinite" rotate="auto" />
                <animate attributeName="opacity" values="0; 1; 1; 0" keyTimes="0; 0.2; 0.8; 1" dur="3s" repeatCount="indefinite" />
                <animateTransform attributeName="transform" type="scale" values="0.5; 1" dur="3s" repeatCount="indefinite" additive="sum" />
            </circle>
        </g>
    </g>
</svg>