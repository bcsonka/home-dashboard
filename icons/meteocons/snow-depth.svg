<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <!-- Soft Drop Shadow for Depth (Meteocons aesthetic) -->
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#041246" flood-opacity="0.12"/>
        </filter>
        
        <!-- Smooth Gradients for Snow -->
        <linearGradient id="driftBackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f8fafc"/>
            <stop offset="100%" stop-color="#bae6fd"/>
        </linearGradient>

        <linearGradient id="driftFrontGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#e0f2fe"/>
        </linearGradient>

        <linearGradient id="stickRed" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ef4444"/>
            <stop offset="100%" stop-color="#b91c1c"/>
        </linearGradient>

        <!-- Wind/Drift Gradients (Faded edges, opaque center - matching your original file) -->
        <linearGradient id="windGradFront" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
            <stop offset="20%" stop-color="#ffffff" stop-opacity="1"/>
            <stop offset="80%" stop-color="#ffffff" stop-opacity="1"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>

        <linearGradient id="windGradBack" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#bae6fd" stop-opacity="0"/>
            <stop offset="20%" stop-color="#bae6fd" stop-opacity="1"/>
            <stop offset="80%" stop-color="#bae6fd" stop-opacity="1"/>
            <stop offset="100%" stop-color="#bae6fd" stop-opacity="0"/>
        </linearGradient>

        <!-- Measuring Stick Clip Boundary -->
        <clipPath id="stickClip">
            <rect x="48" y="12" width="6" height="52" rx="2.5"/>
        </clipPath>
    </defs>

    <!-- 1. BACK SNOW DRIFT (Medium-deep height) -->
    <path d="M -5 65 L -5 24 Q 20 18 40 24 T 70 24 L 70 65 Z" fill="url(#driftBackGrad)" />

    <!-- 2. BACKGROUND WIND GUSTS & PARTICLES (Behind the stake) -->
    <g>
        <!-- Background Gust -->
        <path fill="none" stroke="url(#windGradBack)" stroke-width="2" stroke-linecap="round" d="M 0 24 Q 15 21 30 25">
            <animateTransform attributeName="transform" type="translate" values="-10, 0; 35, -1" dur="1.8s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0; 1; 0" dur="1.8s" repeatCount="indefinite" />
        </path>
        
        <!-- Background Particle -->
        <circle cx="0" cy="22" r="1.2" fill="#bae6fd" opacity="0">
            <animate attributeName="cx" values="-5; 60" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
            <animate attributeName="cy" values="22; 20; 24" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>
            <animate attributeName="opacity" values="0; 1; 1; 0" dur="1.5s" keyTimes="0; 0.2; 0.8; 1" repeatCount="indefinite" begin="0.5s"/>
        </circle>
    </g>

    <!-- 3. MEASURING STAKE -->
    <g filter="url(#softShadow)">
        <g clip-path="url(#stickClip)">
            <!-- Stake Base -->
            <rect x="48" y="12" width="6" height="52" fill="#f8fafc"/>
            <!-- High-Contrast Ticks -->
            <rect x="48" y="16" width="6" height="4" fill="url(#stickRed)"/>
            <rect x="48" y="24" width="6" height="4" fill="url(#stickRed)"/>
            <rect x="48" y="32" width="6" height="4" fill="url(#stickRed)"/>
            <rect x="48" y="40" width="6" height="4" fill="url(#stickRed)"/>
            <rect x="48" y="48" width="6" height="4" fill="url(#stickRed)"/>
            <rect x="48" y="56" width="6" height="4" fill="url(#stickRed)"/>
        </g>
    </g>

    <!-- 4. FRONT SNOW DRIFT (Perfectly overlapping the 3rd red tick) -->
    <g filter="url(#softShadow)">
        <path d="M -5 65 L -5 32 Q 15 26 35 32 T 70 32 L 70 65 Z" fill="url(#driftFrontGrad)" />
    </g>

    <!-- 5. FOREGROUND WIND GUSTS & PARTICLES (Mimicking your original file) -->
    <g>
        <!-- Gust 1 (Top edge, thick stroke) -->
        <path fill="none" stroke="url(#windGradFront)" stroke-width="2.5" stroke-linecap="round" d="M 0 32 Q 15 29 30 33">
            <animateTransform attributeName="transform" type="translate" values="-15, 0; 30, -2" dur="1.6s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0; 1; 0" dur="1.6s" repeatCount="indefinite" />
        </path>
        
        <!-- Gust 2 (Lower edge, delayed) -->
        <path fill="none" stroke="url(#windGradFront)" stroke-width="2" stroke-linecap="round" d="M 0 42 Q 15 45 30 43">
            <animateTransform attributeName="transform" type="translate" values="-5, 0; 40, -1" dur="2s" repeatCount="indefinite" begin="0.7s" />
            <animate attributeName="opacity" values="0; 1; 0" dur="2s" repeatCount="indefinite" begin="0.7s" />
        </path>

        <!-- Fast Particles (Simulating ice crystals blowing) -->
        <!-- Particle 1 -->
        <circle cx="0" cy="35" r="1.5" fill="#ffffff" opacity="0">
            <animate attributeName="cx" values="-10; 65" dur="1.8s" repeatCount="indefinite" />
            <animate attributeName="cy" values="35; 32; 37" dur="1.8s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0; 1; 1; 0" dur="1.8s" keyTimes="0; 0.2; 0.8; 1" repeatCount="indefinite" />
        </circle>

        <!-- Particle 2 -->
        <circle cx="0" cy="40" r="1" fill="#ffffff" opacity="0">
            <animate attributeName="cx" values="-5; 55" dur="1.4s" repeatCount="indefinite" begin="0.4s" />
            <animate attributeName="cy" values="40; 43; 39" dur="1.4s" repeatCount="indefinite" begin="0.4s" />
            <animate attributeName="opacity" values="0; 1; 1; 0" dur="1.4s" keyTimes="0; 0.2; 0.8; 1" repeatCount="indefinite" begin="0.4s" />
        </circle>

        <!-- Particle 3 -->
        <circle cx="0" cy="38" r="1.2" fill="#ffffff" opacity="0">
            <animate attributeName="cx" values="-20; 60" dur="1.6s" repeatCount="indefinite" begin="0.9s" />
            <animate attributeName="cy" values="38; 35; 39" dur="1.6s" repeatCount="indefinite" begin="0.9s" />
            <animate attributeName="opacity" values="0; 1; 1; 0" dur="1.6s" keyTimes="0; 0.2; 0.8; 1" repeatCount="indefinite" begin="0.9s" />
        </circle>
    </g>
</svg>