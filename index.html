    <script>
		const LATITUDE = 42.4058459560502;
		const LONGITUDE = -83.67106870545311;
		const ELEVATION = 285;
		
		const iconMap = {
			"clear-day": "clear-day.svg",
			"clear-night": "clear-night.svg",
			"partly-cloudy-day": "partly-cloudy-day.svg",
			"partly-cloudy-night": "partly-cloudy-night.svg",
			"cloudy": "cloudy.svg",
			"drizzle": "drizzle.svg",
			"overcast": "overcast.svg",
			"rain": "rain.svg",
			"heavy-rain": "extreme-rain.svg",
			"snow": "snow.svg",
			"fog": "fog.svg",
			"wind": "wind.svg",
			"thundersnow": "thunderstorms-snow.svg",
			"thunderstorm": "thunderstorms.svg",
			"thunderstorm-rain": "thunderstorms-rain.svg"
		};
		
		const MOON_PHASES = [
			{ name: "new",             isInPhase: angle => angle >= 348.75 || angle < 11.25 },
			{ name: "waxing-crescent", isInPhase: angle => angle >= 11.25 && angle < 78.75 },
			{ name: "first-quarter",   isInPhase: angle => angle >= 78.75 && angle < 101.25 },
			{ name: "waxing-gibbous",  isInPhase: angle => angle >= 101.25 && angle < 168.75 },
			{ name: "full",            isInPhase: angle => angle >= 168.75 && angle < 191.25 },
			{ name: "waning-gibbous",  isInPhase: angle => angle >= 191.25 && angle < 258.75 },
			{ name: "last-quarter",    isInPhase: angle => angle >= 258.75 && angle < 281.25 },
			{ name: "waning-crescent", isInPhase: angle => angle >= 281.25 && angle < 348.75 }
		];
		
		// --- PIXEL DRIFT (burn‑in protection) ---
		const driftPositions = [
		  { x: 0,  y: 0 },
		  { x: 1,  y: 0 },
		  { x: 1,  y: 1 },
		  { x: 0,  y: 1 },
		  { x: -1, y: 1 },
		  { x: -1, y: 0 },
		  { x: -1, y: -1 },
		  { x: 0,  y: -1 },
		  { x: 1,  y: -1 }
		];
		
		let driftIndex = 0;

		function mapMetarToIcon(condition, isDaytime) {
			const c = condition.toLowerCase();
			
			// --- Snow ---
			if (c.includes("snow")) return "snow";

			// --- Thunderstorms ---
			if (c.includes("thundersnow")) return "thundersnow";
			if (c.includes("thunderstorm with rain")) return "thunderstorm-rain";
			if (c.includes("thunderstorm")) return "thunderstorm";

			// --- Heavy Rain ---
			if (c.includes("heavy rain")) return "heavy-rain";

			// --- Light Rain ---
			if (c.includes("light rain")) return "drizzle";

			// --- Normal Rain ---

		function computeRelativeHumidity(tC, tdC) {
			const a = 17.625;
			const b = 243.04;
			const es = 6.1094 * Math.exp((a * tC) / (b + tC));
			const e = 6.1094 * Math.exp((a * tdC) / (b + tdC));
			return Math.round((e / es) * 100);

		function parseMETAR(metar) {
			//console.log("metar", metar);
			const parts = metar.trim().split(/\s+/);

			const result = {
				raw: metar,
				station: parts[0] || "",
				time: parts[1] || "",
				windDirDeg: null,
				windSpeedKts: null,
				windGustKts: null,
				visibilitySm: null,
				tempC: null,
				dewpointC: null,
				altimeterInHg: null,
				weatherCodes: [],
				clouds: []
			};

			for (let i = 2; i < parts.length; i++) {
				const token = parts[i];
				//console.log("parts[" + i + "]", parts[i]);

				const windMatch = token.match(/^(\d{3}|VRB)(\d{2})(G(\d{2}))?KT$/);
				//console.log("windMatch", windMatch);
				if (windMatch) {
					const dir = windMatch[1];
					//console.log("dir", dir);
					const spd = parseInt(windMatch[2], 10);
					//console.log("spd", spd);
					const gust = windMatch[4] ? parseInt(windMatch[4], 10) : null;
					//console.log("gust", gust);

					result.windDirDeg = dir === "VRB" ? null : parseInt(dir, 10);
					result.windSpeedKts = spd;
					result.windGustKts = gust;
					continue;
				}

				const visMatch = token.match(/^(\d+)(SM)$/);
				if (visMatch) {
					result.visibilitySm = parseInt(visMatch[1], 10);
					continue;
				}

				const tempMatch = token.match(/^([M\d]{2,3})\/([M\d]{2,3})$/);
				if (tempMatch) {
					const parseTemp = (str) => {
						if (str.startsWith("M")) return -parseInt(str.slice(1), 10);
						return parseInt(str, 10);
					};
					result.tempC = parseTemp(tempMatch[1]);
					result.dewpointC = parseTemp(tempMatch[2]);
					continue;
				}

				const altMatch = token.match(/^A(\d{4})$/);
				if (altMatch) {
					const val = parseInt(altMatch[1], 10);
					result.altimeterInHg = (val / 100.0).toFixed(2);
					continue;
				}

				if (/^(FEW|SCT|BKN|OVC)\d{3}/.test(token)) {
					result.clouds.push(token);
					continue;
				}

				if (/^(?:\+|\-)?(SN|RA|DZ|FZRA|PL|SG|IC|UP|BR|FG|HZ|TS)/.test(token)) {
					result.weatherCodes.push(token);
					continue;
				}

				if (token === "RMK") break;
			}

			return result;
		}

		function classifyMetarCondition(parsed) {
			const codes = parsed.weatherCodes.join(" ");

			// --- Granular Snow ---
			if (codes.includes("+SN")) return "Heavy Snow";
			if (codes.includes("-SN")) return "Light Snow";
			if (/\bSHSN\b/.test(codes)) return "Snow Showers";
			if (/\bBLSN\b/.test(codes)) return "Blowing Snow";
			if (/\bSG\b/.test(codes)) return "Granular Snow";
			if (/\bIC\b/.test(codes)) return "Ice Crystals";
			if (/\bSN\b/.test(codes)) return "Snow"; // default (moderate)

			// --- Freezing Rain / Ice ---
			if (/FZRA/.test(codes)) return "Freezing Rain";

			// --- Rain ---
			if (codes.includes("-RA")) return "Light Rain";
			if (codes.includes("+RA")) return "Heavy Rain";
			if (codes.includes("RA") || codes.includes("DZ")) return "Rain";
			
			if (codes.includes("TSGR")) return "Thunderstorm with Hail";
			if (codes.includes("TSRA")) return "Thunderstorm with Rain";
			if (codes.includes("TSSN")) return "Thundersnow";
			if (codes.includes("TS")) return "Thunderstorm";
			if (codes.includes("VCTS")) return "Nearby Thunderstorms";

			// Fog handled elsewhere — do NOT classify here

			// --- Clouds ---
			const clouds = parsed.clouds;
			if (clouds.some(c => c.startsWith("OVC"))) return "Overcast";
			if (clouds.some(c => c.startsWith("BKN"))) return "Mostly Cloudy";
			if (clouds.some(c => c.startsWith("SCT") || c.startsWith("FEW"))) return "Partly Cloudy";

			return "Clear";
		}
		
		function toDMS(dec, isLat) {
			const dir = dec >= 0
				? (isLat ? "N" : "E")
				: (isLat ? "S" : "W");

			const abs = Math.abs(dec);
			const deg = Math.floor(abs);
			const minFloat = (abs - deg) * 60;
			const min = Math.floor(minFloat);
			const secFormatter = new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 3 });
			const sec = secFormatter.format((minFloat - min) * 60);

			return `${deg}° ${min}' ${sec}" ${dir}`;
		}
		
		function parseCloudString(str) {
			const type = str.slice(0, 3).toUpperCase();   // FEW, SCT, BKN, OVC
			const heightHundreds = parseInt(str.slice(3), 10); // e.g. 28 → 2800 ft
			const altitude = heightHundreds * 100;
			return { type, altitude };
		}
		
		function classifySkyFromMetarClouds(clouds) {
			console.log(JSON.stringify(clouds, null, 2));
			if (!clouds || clouds.length === 0) return "Clear";

			let hasOvercast = false;
			let hasBroken = false;
			let hasScattered = false;
			let hasFew = false;

			for (const layer of clouds) {
				if (!layer) continue;

				// Normalize type
				const type = (layer.type || "").toUpperCase();

				// Only consider clouds below 20,000 ft
				if (layer.altitude <= 20000) {
					if (type === "OVC") hasOvercast = true;
					else if (type === "BKN") hasBroken = true;
					else if (type === "SCT") hasScattered = true;
					else if (type === "FEW") hasFew = true;
				}
			}

			if (hasOvercast) return "Overcast";
			if (hasBroken) return "Mostly Cloudy";
			if (hasScattered) return "Partly Cloudy";
			if (hasFew) return "Mostly Sunny";

			return "Clear";
		}
		
		function pressureToAngle(pressure) {
			// Clamp between 28.0 and 31.0 inHg
			const clampedPressure = Math.min(Math.max(pressure, 28.0), 31.0);
			// Convert to an angle between -90 and 90 degrees
			return (clampedPressure - 28.0) * 60 - 90;
		}
		
		function getPressureTrend(metarRaw) {
			// 1. Basic safety check
			if (!metarRaw || !metarRaw.includes("RMK")) return "steady";

			const rmk = metarRaw.split("RMK")[1];

			// 2. Check for explicit text codes (US Stations often use these)
			if (rmk.includes("PRESRR")) return "rising-rapid";
			if (rmk.includes("PRESR"))  return "rising";
			if (rmk.includes("PRESFR")) return "falling-rapid";
			if (rmk.includes("PRESF"))  return "falling";

			// 3. Check for the "5-Group" (Standard World Meteorological Organization format)
			// Format: 5appp (5 = group ID, a = characteristic, ppp = amount of change)
			// Regex matches "5" followed by a digit 0-8, followed by 3 digits
			const trendMatch = rmk.match(/\b5([0-8])\d{3}\b/);

			if (trendMatch) {
				const code = parseInt(trendMatch[1], 10);

				// Codes 0, 1, 2, 3 indicate the pressure is higher now than 3 hours ago
				if (code <= 3) return "rising";

				// Codes 5, 6, 7, 8 indicate the pressure is lower now than 3 hours ago
				if (code >= 5) return "falling";

				// Code 4 indicates the pressure is exactly the same (Steady)
				return "steady";
			}

			return "steady";
		}

		function calculateWindChill(tempF, windMph) {
			// Wind Chill only applies if Temp <= 50F and Wind > 3mph
			if (tempF <= 50 && windMph > 3) {
				return 35.74 + (0.6215 * tempF) - (35.75 * Math.pow(windMph, 0.16)) + (0.4275 * tempF * Math.pow(windMph, 0.16));
			}
			return tempF; // Otherwise, it feels like the actual temp
		}
		
		function calculateHeatIndex(tempF, humidity) {
			// Heat Index only applies if Temp >= 80F
			if (tempF < 80) return tempF;

			// Standard NOAA Rothfusz Regression Formula
			const T = tempF;
			const RH = humidity;
			
			let hi = -42.379 + 2.04901523*T + 10.14333127*RH - .22475541*T*RH - .00683783*T*T - .05481717*RH*RH + .00122874*T*T*RH + .00085282*T*RH*RH - .00000199*T*T*RH*RH;

			// Adjustments for specific conditions
			if (RH < 13 && T >= 80 && T <= 112) {
				hi -= ((13 - RH) / 4) * Math.sqrt((17 - Math.abs(T - 95)) / 17);
			} else if (RH > 85 && T >= 80 && T <= 87) {
				hi += ((RH - 85) / 10) * ((87 - T) / 5);
			}

			return hi;
		}
		
		function updateAQI(aqi) {

				return;
			}

			let angle = 0;
			let description = "";

			// The gauge is a 180-degree half circle divided into 6 equal 30-degree segments.
			// This maps the non-linear EPA AQI scale perfectly to the gauge.
			if (aqi <= 50) {
				angle = (aqi / 50) * 30;
				description = "Good";
			} else if (aqi <= 100) {
				angle = 30 + ((aqi - 50) / 50) * 30;
				description = "Moderate";
			} else if (aqi <= 150) {
				angle = 60 + ((aqi - 100) / 50) * 30;
				description = "Sensitive";
			} else if (aqi <= 200) {
				angle = 90 + ((aqi - 150) / 50) * 30;
				description = "Unhealthy";
			} else if (aqi <= 300) {
				angle = 120 + ((aqi - 200) / 100) * 30;
				description = "Very Unhealthy";
			} else {
				let cappedAqi = Math.min(aqi, 500);
				angle = 150 + ((cappedAqi - 300) / 200) * 30;
				description = "Hazardous";
			}

			// Update the HTML text
			document.getElementById("aqi-val").textContent = Math.round(aqi);
			document.getElementById("aqi-desc").textContent = description;

			// Rotate the SVG needle smoothly
			const needle = document.getElementById("aqi-needle");
			if (needle) {
				needle.style.transform = `rotate(${angle}deg)`;
			}
		}

				const windMph = knotsToMph(metar.windSpeedKts ?? 0);
				const gustMph = metar.windGustKts ? knotsToMph(metar.windGustKts) : null;

				// 1. Get Base Data
				const temp = Math.round(vcData.currentConditions.temp);
				// Note: We need Relative Humidity for Heat Index

				let calculatedFeelsLike = temp;

				// 2. MASTER LOGIC: Decide which formula to use

					// WINTER: Wind Chill

				} else if (temp >= 80) {

					calculatedFeelsLike = calculateHeatIndex(temp, humidity);

				// 3. Round and Display

					document.querySelector(".feelslike-temp").textContent = `${feelsLike}°`;

					// 4. Update the Dynamic Icon (Your existing logic works perfectly with the new value)
					const flIcon = document.querySelector(".feelslike-icon");
					let flFilename = "feels-like.svg"; // Default (Silver)
					let flTitle = "Feels Like";

						flFilename = "feels-like-cooler.svg";
						flTitle = "Wind Chill";
					} else if (feelsLike > temp) {
						// It feels warmer than it actually is (Heat Index) -> RED

					// If they are equal, it stays Silver

					flIcon.src = `icons/meteocons/${flFilename}`;
					flIcon.title = flTitle;

				const isDaytime = vcData.currentConditions.icon?.includes("night") === false;

				// 1. Compute fog logic
				const metarHasRealPrecip = /SN|RA|DZ|FZRA|PL|SG|IC|UP/.test(metar.weatherCodes.join(" "));
				const metarReportsFog = /FG|BR|HZ/.test(metar.weatherCodes.join(" "));
				const visibilityLow = metar.visibilitySm !== null && metar.visibilitySm < 1;
				const realFog = metarReportsFog && visibilityLow;

				// 2. Start with METAR sky as default (will be overridden)
				let effectiveDesc = metarSky;
				let effectiveIcon = mapMetarToIcon(metarSky, isDaytime);

				// 3. Fog override FIRST (highest priority)
				if (realFog) {
					effectiveDesc = "Fog";
					effectiveIcon = "fog";
				}
				// 4. Precip override SECOND
				else if (metarHasRealPrecip) {
					effectiveDesc = metarCondition;
					effectiveIcon = mapMetarToIcon(metarCondition, isDaytime);
				}
				// 5. Otherwise trust VisualCrossing

					const vcDesc = vcData.currentConditions.conditions;
					effectiveDesc = vcDesc;
					effectiveIcon = mapMetarToIcon(vcDesc, isDaytime);
				}

				document.querySelector(".desc").textContent = effectiveDesc;
				document.querySelector(".icon").src = `icons/meteocons/${iconMap[effectiveIcon] || "cloudy.svg"}`;

				// Background logic
				const bgVideoElement = document.getElementById("bg-video");
				document.body.classList.remove("snow-bg", "clouds-bg", "rain-bg", "fog-bg");
				bgVideoElement.style.display = "none";
				bgVideoElement.style.filter = bgVideoElement.style.filter.replace(/brightness\([^)]*\)/, "").trim();

				if (metarHasRealPrecip || realFog) {
					// METAR overrides
					if (metarCondition.includes("Snow")) {
						//document.body.classList.add("snow-bg");
						bgVideoElement.src = "videos/snow.mp4";
						bgVideoElement.style.removeProperty("display");
						bgVideoElement.style.filter = `${bgVideoElement.style.filter} brightness(1.3)`.trim();
					}
					else if (metarCondition.includes("Rain")) document.body.classList.add("rain-bg");
					else if (metarCondition.includes("Fog")) document.body.classList.add("fog-bg");
					else if (metarCondition.includes("Clear")) {
						//document.body.classList.add("clear-bg");
						bgVideoElement.src = "videos/clear4.mp4";
						bgVideoElement.style.removeProperty("display");
						bgVideoElement.style.filter = `${bgVideoElement.style.filter} brightness(1.3)`.trim();
					}
					else if (descLower.includes("Partly Cloudy")) {
						bgVideoElement.src = "videos/partly-cloudy.mp4";
						bgVideoElement.style.removeProperty("display");
						bgVideoElement.style.filter = `${bgVideoElement.style.filter} brightness(1.3)`.trim();
					}
					else if (metarCondition.includes("Cloud")) document.body.classList.add("clouds-bg");
					else if (metarCondition.includes("Overcast")) {
						bgVideoElement.src = "videos/overcast.mp4";
						bgVideoElement.style.removeProperty("display");
						bgVideoElement.style.filter = `${bgVideoElement.style.filter} brightness(1.3)`.trim();
					}
				} else {
					// Trust VisualCrossing
					const descLower = vcData.currentConditions.conditions.toLowerCase();
					if (descLower.includes("snow")) {
						//document.body.classList.add("snow-bg");
						bgVideoElement.src = "videos/snow.mp4";
						bgVideoElement.style.removeProperty("display");
						bgVideoElement.style.filter = `${bgVideoElement.style.filter} brightness(1.3)`.trim();
					}
					else if (descLower.includes("rain")) document.body.classList.add("rain-bg");
					else if (descLower.includes("fog")) document.body.classList.add("fog-bg");
					else if (descLower.includes("clear")) {
						//document.body.classList.add("clear-bg");
						bgVideoElement.src = "videos/clear4.mp4";
						bgVideoElement.style.removeProperty("display");
						bgVideoElement.style.filter = `${bgVideoElement.style.filter} brightness(1.3)`.trim();
					}
					else if (descLower.includes("partially cloudy")) {

					else if (descLower.includes("cloud")) document.body.classList.add("clouds-bg");

				}
				
				document.querySelector(".meta").innerHTML = `<img src="icons/location-pin.svg" class="location-pin"> ${address}`;
				document.querySelector(".gps").innerHTML = `<img src="icons/location-gps.svg" class="location-gps"> ${gpsCoordinates}`;

				windsockIcon.title = getWindSpeedDesc(windMph);
				document.querySelector(".wind-arrow").style.transform = `translate(-50%, -50%) rotate(${windDir}deg)`;
				document.querySelector(".wind-compass").title = `Wind Origin - ${windDir}°`;
				document.querySelector(".wind-speed").textContent = `${Math.round(windMph)} mph ${windDir != null && windMph > 0 ? degreesToCompassDirection(windDir) : ""}`;

				if (gustMph != null && gustMph > windMph) {
					document.querySelector(".wind-gust").innerHTML = `<img src="icons/meteocons/wind.svg" class="gust-icon" title="Wind Gusts"> ${Math.round(gustMph)} mph`;
				} else {
					document.querySelector(".wind-gust").textContent = "";
				}

				// Humidity from METAR (derived)
				if (metar.tempC != null && metar.dewpointC != null) {
					const rh = computeRelativeHumidity(metar.tempC, metar.dewpointC);
					document.querySelector(".humidity-value").textContent = `${rh}%`;
				} else {
					document.querySelector(".humidity-value").textContent = `--%`;
				}
				
				// Dewpoint (°F)
				if (metar.dewpointC != null) {
					const dewF = Math.round(toFahrenheit(metar.dewpointC));
					document.querySelector(".dewpoint-value").textContent = `${dewF}°`;
				} else {
					document.querySelector(".dewpoint-value").textContent = `--°`;
				}
				
				renderMultiDayConditions(vcData.days, 5);
				
				// --- NEW: Calculate Precipitation OR Snow So Far ---
				const currentHour = new Date().getHours();

				// 1. Calculate Liquid (Rain) totals
				let rainSoFar = 0;
				if (vcData.days[0].hours) {
					rainSoFar = vcData.days[0].hours
						.slice(0, currentHour + 1)
						.reduce((sum, h) => sum + (h.precip || 0), 0);
				}
				const rainTotal = vcData.days[0].precip || 0;

				// 2. Calculate Snow totals
				let snowSoFar = 0;
				if (vcData.days[0].hours) {
					snowSoFar = vcData.days[0].hours
						.slice(0, currentHour + 1)
						.reduce((sum, h) => sum + (h.snow || 0), 0);
				}
				const snowTotal = vcData.days[0].snow || 0;

				// 3. Logic: Determine which to display
				// If there is significant snow forecasted (> 0.1"), show Snow Depth.
				// Otherwise, show Liquid Equivalent (Rain).

				const soFarEl = document.getElementById('precip-so-far');
				const totalEl = document.getElementById('precip-total');
				const iconSoFar = document.getElementById('icon-so-far');
				const iconTotal = document.getElementById('icon-total');
				
				const precipitationRow = document.querySelector('.precip-row');
				const snowDepthColumn = document.querySelector('.snow-depth-col');
				
				// 1. Get Snow Depth from VC (Current Conditions)
				// Using currentConditions.snowdepth gives the live reading
				// Using days[0].snowdepth gives the daily forecast avg/max
				let snowDepth = vcData.currentConditions.snowdepth || vcData.days[0].snowdepth || 0;

				if(snowDepth > 0) {

					precipitationRow.classList.remove("snow-depth-grid");
					snowDepthColumn.style.display = "none";

				// Decide if we show Snow or Rain data
				if (snowTotal > 0.1 || temp <= 37) {
					// SNOW MODE
					document.getElementById('label-so-far').innerHTML = "Today";
					document.getElementById('label-total').innerHTML = "Due";
					
					soFarEl.textContent = `${snowSoFar.toFixed(1)}"`;
					totalEl.textContent = `${snowTotal.toFixed(1)}"`;
					
					// Update Icons to Snow versions
					iconSoFar.src = "icons/meteocons/snow-so-far.svg";
					iconTotal.src = "icons/meteocons/snow-total.svg";
					
				} else {
					// RAIN MODE
					document.getElementById('label-so-far').innerHTML = "Today";
					document.getElementById('label-total').innerHTML = "Due";
					
					soFarEl.textContent = `${rainSoFar.toFixed(2)}"`;
					totalEl.textContent = `${rainTotal.toFixed(2)}"`;
					
					// Update Icons to Rain versions
					iconSoFar.src = "icons/meteocons/rain-so-far.svg";
					iconTotal.src = "icons/meteocons/rain-total.svg";
				}
			} catch (err) {
				console.log(err);
				document.querySelector(".desc").textContent = "Weather unavailable";
			}
		}

		async function updateForecast() {
			const apiKey = "MW4Y3ALYDJZ44TNYHD8ZCVE8W";
			const address = "4653 6 Mile Road, Northfield Township, MI 48178-9637";
			const url = `https://weather.visualcrossing.com/VisualCrossingWebServices/rest/services/timeline/${encodeURIComponent(address)}/next5days?unitGroup=us&key=${apiKey}&contentType=json&include=current,hours,days`;

			try {
				const response = await fetch(url);
				const data = await response.json();

				const container = document.querySelector(".forecast");
				container.innerHTML = "";

				const now = new Date();
				const todayHours = data.days[0].hours;

				const currentHourIndex = todayHours.findIndex(h => {
					const [hStr] = h.datetime.split(":");
					return parseInt(hStr) === now.getHours();
				});

				let nextHours = todayHours.slice(currentHourIndex, currentHourIndex + 8);

				if (nextHours.length < 8) {
					const remaining = 8 - nextHours.length;
					nextHours = nextHours.concat(data.days[1].hours.slice(0, remaining));
				}

				nextHours.forEach(entry => {
					const [hour, minute] = entry.datetime.split(":");
					const dateObj = new Date();
					dateObj.setHours(parseInt(hour), parseInt(minute));

					const time = dateObj.toLocaleTimeString([], {
						hour: "numeric",
						minute: "2-digit"
					});
					const temp = Math.round(entry.temp);
					const icon = entry.icon;

					// --- UPDATED LOGIC START ---
					let hourlyPrecipIcon = "rain-percent.svg";

					// Check 1: Does the API explicitly say snow?
					// Always trust the API first if it has an opinion.
					const isSnowType = entry.preciptype && entry.preciptype.includes("snow");

					// Check 2: Temperature Fallback
					// If the API doesn't specify, assume snow if it's 37°F or colder.
					// 32°F is too strict; snow often falls in the 33-37°F range.
					const isColdEnoughForSnow = entry.temp <= 37;

					if (isSnowType || (entry.preciptype === null && isColdEnoughForSnow)) {
						hourlyPrecipIcon = "snow-percent.svg";
					}
					// --- UPDATED LOGIC END ---

					const item = document.createElement("div");
					item.className = "hourly-item";

					item.innerHTML = `
						<div class="hour-time">${time}</div>
						<img class="hour-icon" src="icons/meteocons/${iconMap[icon] || "cloudy.svg"}">
						<div class="hour-temp">${Math.round(entry.temp)}°</div>
						<div class="hour-precip">
							<img class="hour-precip-icon" src="icons/meteocons/${hourlyPrecipIcon}">
							${Math.round(entry.precipprob)}%
						</div>
					`;

					container.appendChild(item);
				});
			} catch (err) {
				console.log("Forecast unavailable", err);
			}
		}
		
		function applyPixelDrift() {
		  const el = document.querySelector(".dashboard");
		  if (!el) return;

		  const pos = driftPositions[driftIndex];
		  el.style.transform = `translate(${pos.x}px, ${pos.y}px)`;

		  driftIndex = (driftIndex + 1) % driftPositions.length;
		}

		document.addEventListener("DOMContentLoaded", () => {
			// Load barometer SVG first
			fetch("icons/barometer.svg")
				.then(r => r.text())
				.then(svg => {
					let barometerGauge = document.querySelector(".barometer-gauge");
					barometerGauge.innerHTML = svg;
					barometerGauge.title = "Pressure";
					updateWeather();
				});

			updateClock();
			setInterval(updateClock, 1000);

			// Remove the earlier updateWeather() call here
			setInterval(updateWeather, 5 * 60 * 1000);

			updateForecast();
			setInterval(updateForecast, 5 * 60 * 1000);

			// drift every 3 minutes
			setInterval(applyPixelDrift, 3 * 60 * 1000);
		});
	</script>

							<line x1="7" y1="70" x2="10" y2="70" transform="rotate(120 50 70)" />
							<line x1="7" y1="70" x2="10" y2="70" transform="rotate(150 50 70)" />
							<line x1="7" y1="70" x2="10" y2="70" transform="rotate(180 50 70)" />
						</g>

						<!-- Dark Track Background (Sits behind the colored arcs) -->
						<!-- R=34, Stroke=12 -->
						<path d="M 16 70 A 34 34 0 0 1 84 70" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="12" />

						<!-- 3. Colored EPA AQI Segments (Thickened to 12) -->
						<g stroke-width="12" filter="url(#gauge-shadow)">
							<!-- Good (Soft Green) -->
							<path stroke="#22c55e" d="M 16 70 A 34 34 0 0 1 20.56 53" />
							<!-- Moderate (Soft Yellow) -->
							<path stroke="#eab308" d="M 20.56 53 A 34 34 0 0 1 33 40.56" />
							<!-- Sensitive (Soft Orange) -->
							<path stroke="#f97316" d="M 33 40.56 A 34 34 0 0 1 50 36" />
							<!-- Unhealthy (Soft Red) -->
							<path stroke="#ef4444" d="M 50 36 A 34 34 0 0 1 67 40.56" />
							<!-- Very Unhealthy (Soft Purple) -->
							<path stroke="#a855f7" d="M 67 40.56 A 34 34 0 0 1 79.44 53" />
							<!-- Hazardous (Maroon) -->
							<path stroke="#be123c" d="M 79.44 53 A 34 34 0 0 1 84 70" />
						</g>

						<!-- 4. Subtle AQI Label -->
						<text x="50" y="87" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="1">AQI</text>

						<!-- 5. Glass Glare / Reflection (Premium UI Touch) -->
						<path d="M 12 56 A 42 42 0 0 1 40 29.5" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.15" />

						<!-- 6. The Animatable Needle -->
						<g id="aqi-needle" filter="url(#gauge-shadow)">
							<!-- Sleek Needle Pointer (Extended to X=14 so it reaches over the colored band) -->
							<line x1="50" y1="70" x2="14" y2="70" stroke="#f8fafc" stroke-width="2.5" stroke-linecap="round" />
							
							<!-- Center Pivot Hardware -->
							<circle cx="50" cy="70" r="4.5" fill="#f8fafc" />
							<circle cx="50" cy="70" r="2.5" fill="#0f172a" />
						</g>
					</svg>
					<div class="aqi-info outline">
						<div class="aqi-value" id="aqi-val">--</div>
						<div class="aqi-desc" id="aqi-desc">Loading...</div>
					</div>
				</div>
			</div>

			<div class="humidity-dewpoint-row">

				<div class="humidity-block">
					<img src="icons/meteocons/humidity.svg" class="humidity-icon" title="Humidity"/>
					<span class="humidity-value outline">--%</span>
				</div>

				<div class="dewpoint-block">
					<img src="icons/meteocons/dewpoint.svg" class="dewpoint-icon" title="Dewpoint"/>
					<span class="dewpoint-value outline">--°</span>
				</div>

				<div class="barometer-block">
					<div class="barometer-gauge"></div>
					<div class="barometer-value outline"></div>
				</div>
			</div>

			<div class="astro-container">
				<div class="sun-times outline">
					<div><img class="uv-icon"></div>
					<div><img src="icons/meteocons/sunrise.svg" class="sun-icon" title="Sunrise"><span id="sunrise">--:--</span></div>
					<div><img src="icons/meteocons/sunset.svg" class="sun-icon" title="Sunset"><span id="sunset">--:--</span></div>
				</div>

				<div class="moon-times outline">
					<div><img class="moon-phase-icon"></div>
					<div><img src="icons/meteocons/moonrise.svg" class="sun-icon" title="Moonrise"><span id="moonrise">--:--</span></div>
					<div><img src="icons/meteocons/moonset.svg" class="sun-icon" title="Moonset"><span id="moonset">--:--</span></div>
				</div>
			</div>
		</div>
    </div>

    <!-- BOTTOM ROW: Forecast -->
    <div class="bottom-row">
		<div class="forecast outline"></div>
		<div class="precip-prob outline"></div>
		<div class="multi-day-conditions outline"></div>
	</div>
</div>
</body>
</html>
