<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
	<defs>
		<!-- Water Gradient (Vibrant Blue) -->
		<linearGradient id="waterGrad" x1="0" y1="0" x2="1" y2="0">
			<stop offset="0" stop-color="#60a5fa" stop-opacity="0.9"/>
			<stop offset="0.5" stop-color="#3b82f6" stop-opacity="0.9"/>
			<stop offset="1" stop-color="#2563eb" stop-opacity="0.9"/>
		</linearGradient>
		
        <!-- Vapor Gradient (Fades out at top) -->
		<linearGradient id="vaporGrad" x1="0" y1="1" x2="0" y2="0">
			<stop offset="0" stop-color="#60a5fa" stop-opacity="0"/>
			<stop offset="0.3" stop-color="#60a5fa" stop-opacity="1"/>
			<stop offset="0.7" stop-color="#60a5fa" stop-opacity="1"/>
			<stop offset="1" stop-color="#60a5fa" stop-opacity="0"/>
		</linearGradient>
	</defs>

    <!-- SCALING GROUP: Reduced to 75% size and centered (Offset 8px) -->
    <g transform="translate(8, 8) scale(0.75)">
    
        <!-- Main Water Droplet (Left Side) -->
        <path fill="url(#waterGrad)" d="M24 12 Q 12 30 12 40 A 12 12 0 0 0 36 40 Q 36 30 24 12 Z">
            <!-- Subtle "breathing" animation -->
            <animateTransform attributeName="transform" type="scale" values="1 1; 1.05 0.95; 1 1" dur="3s" repeatCount="indefinite" additive="sum" transform-origin="24 40"/>
        </path>
        
        <!-- Highlight on Drop -->
        <path d="M20 22 Q 17 30 17 38" stroke="white" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.4">
             <animateTransform attributeName="transform" type="scale" values="1 1; 1.05 0.95; 1 1" dur="3s" repeatCount="indefinite" additive="sum" transform-origin="24 40"/>
        </path>

        <!-- RISING VAPOR WAVES (Right Side) -->
        
        <!-- Wave 1 (Left-most wave) -->
        <path stroke="url(#vaporGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" d="M42 45 Q 46 40 42 35 T 42 25">
            <animate attributeName="d" values="M42 45 Q 46 40 42 35 T 42 25; M42 35 Q 38 30 42 25 T 42 15" dur="2s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" />
        </path>

        <!-- Wave 2 (Middle wave - Delayed) -->
        <path stroke="url(#vaporGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" d="M50 48 Q 54 43 50 38 T 50 28">
            <animate attributeName="d" values="M50 48 Q 54 43 50 38 T 50 28; M50 38 Q 46 33 50 28 T 50 18" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
            <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
        </path>
        
        <!-- Wave 3 (Bottom/Right wave - Slowest) -->
        <path stroke="url(#vaporGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" d="M45 52 Q 41 47 45 42 T 45 32">
            <animate attributeName="d" values="M45 52 Q 41 47 45 42 T 45 32; M45 42 Q 49 37 45 32 T 45 22" dur="3s" repeatCount="indefinite" begin="1s"/>
            <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="1s"/>
        </path>
    </g>
</svg>