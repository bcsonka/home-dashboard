<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%" role="img" aria-label="Barometric pressure gauge">
    <defs>
        <!-- Darker, more pronounced shadow for the dark theme -->
        <filter id="needle-shadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.5" />
        </filter>
    </defs>

    <!-- Top Hanging Ring -->
    <circle cx="32" cy="3" r="3" fill="none" stroke="#64748b" stroke-width="2.5" />
    <rect x="29.5" y="4" width="5" height="4" rx="1" fill="#64748b" />

    <!-- Main Outer Casing (Semi-transparent "Glass" to let background video show through) -->
    <circle cx="32" cy="32" r="26" fill="rgba(0, 0, 0, 0.25)" stroke="#475569" stroke-width="2.5" />
    
    <!-- Inner Depth Ring -->
    <circle cx="32" cy="32" r="23" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.1" />

    <!-- Bottom Dashed Scale -->
    <path d="M 52 32 A 20 20 0 0 1 12 32" fill="none" stroke="#475569" stroke-width="2" stroke-dasharray="3 6" stroke-linecap="round" />

    <!-- Colored Pressure Zones (Brightened for Dark Mode) -->
    <!-- Low / Rain (Cyan) -->
    <path d="M 12 32 A 20 20 0 0 1 22 14.68" fill="none" stroke="#38bdf8" stroke-width="3.5" stroke-linecap="round" />
    <!-- Normal / Change (Slate) -->
    <path d="M 25.16 13.21 A 20 20 0 0 1 38.84 13.21" fill="none" stroke="#94a3b8" stroke-width="3.5" stroke-linecap="round" />
    <!-- High / Fair (Amber) -->
    <path d="M 42 14.68 A 20 20 0 0 1 52 32" fill="none" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round" />

    <!-- Minimalist Tick Marks (Brightened) -->
    <g stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round">
        <line x1="32" y1="16" x2="32" y2="19" transform="rotate(-90 32 32)" />
        <line x1="32" y1="16" x2="32" y2="19" transform="rotate(-60 32 32)" />
        <line x1="32" y1="16" x2="32" y2="19" transform="rotate(-30 32 32)" />
        <line x1="32" y1="16" x2="32" y2="19" transform="rotate(0 32 32)" />
        <line x1="32" y1="16" x2="32" y2="19" transform="rotate(30 32 32)" />
        <line x1="32" y1="16" x2="32" y2="19" transform="rotate(60 32 32)" />
        <line x1="32" y1="16" x2="32" y2="19" transform="rotate(90 32 32)" />
    </g>

    <!-- Center Display Text (White) -->
    <text x="32" y="45" font-family="system-ui, -apple-system, sans-serif" font-size="6" font-weight="700" fill="#f8fafc" text-anchor="middle" letter-spacing="0.25">inHg</text>

    <!-- Dynamic Needle Group -->
    <g id="needle-group" filter="url(#needle-shadow)" transform="rotate(0 32 32)">
        <!-- Needle -->
        <line x1="32" y1="36" x2="32" y2="20" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" />
        <!-- Pivot Base (Inverted to look like a dark metal cap with a white rim) -->
        <circle cx="32" cy="32" r="3.5" fill="#f8fafc" />
        <circle cx="32" cy="32" r="2.5" fill="#0f172a" />
    </g>

    <!-- Glass Glare / Reflection (Kept faint to enhance the glass look) -->
    <path d="M 36 9.4 A 23 23 0 0 1 51.9 20.5" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.15" />
</svg>