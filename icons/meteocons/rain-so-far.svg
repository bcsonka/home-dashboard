<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
	<defs>
		<!-- Cloud Gradient (Soft Silver/White) -->
		<linearGradient id="cloudGrad" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#ffffff"/>
			<stop offset="100%" stop-color="#f1f5f9"/>
		</linearGradient>

		<!-- Water Gradient (Vibrant Cyan to Blue) -->
		<linearGradient id="waterGrad" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#38bdf8"/>
			<stop offset="100%" stop-color="#2563eb"/>
		</linearGradient>

		<!-- Glass Background Gradient (Frosted Transparency) -->
		<linearGradient id="glassGrad" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
			<stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
		</linearGradient>

		<!-- Mask to bound the water exactly inside the glass -->
		<clipPath id="gaugeClip">
			<path d="M 22 22 V 52 A 10 10 0 0 0 42 52 V 22 Z" />
		</clipPath>
	</defs>

	<!-- 1. FLOATING CLOUD -->
	<g>
		<!-- Smooth hover animation -->
		<animateTransform attributeName="transform" type="translate" 
			values="0 0; 0 -2; 0 0" 
			keyTimes="0; 0.5; 1" 
			keySplines="0.4 0 0.2 1; 0.4 0 0.2 1" 
			calcMode="spline" 
			dur="4s" repeatCount="indefinite" />
		
		<!-- Scaled to 0.55 and positioned safely at the top edge -->
		<g transform="translate(14.4, 0) scale(0.55)">
			<path d="M43,30 H21 a6,6,0,0,1,0-12 a6.007,6.007,0,0,1,5.816-4.524 A8.995,8.995,0,0,1,43.08,18.064 A5.992,5.992,0,0,1,43,30 Z"
			      fill="url(#cloudGrad)" stroke="#94a3b8" stroke-width="2.5" stroke-linejoin="round" />
		</g>
	</g>

	<!-- 2. FALLING RAINDROPS -->
	<g stroke="#38bdf8" stroke-width="2" stroke-linecap="round">
		<!-- Left Drop -->
		<g opacity="0">
			<animateTransform attributeName="transform" type="translate" values="0 0; 0 24" keyTimes="0; 1" keySplines="0.4 0 1 1" calcMode="spline" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
			<animate attributeName="opacity" values="0; 1; 1; 0" keyTimes="0; 0.1; 0.7; 1" dur="1.2s" repeatCount="indefinite" begin="0.4s"/>
			<line x1="27" y1="17" x2="27" y2="21" />
		</g>
		<!-- Center Drop -->
		<g opacity="0">
			<animateTransform attributeName="transform" type="translate" values="0 0; 0 24" keyTimes="0; 1" keySplines="0.4 0 1 1" calcMode="spline" dur="1.2s" repeatCount="indefinite" begin="0s"/>
			<animate attributeName="opacity" values="0; 1; 1; 0" keyTimes="0; 0.1; 0.7; 1" dur="1.2s" repeatCount="indefinite" begin="0s"/>
			<line x1="32" y1="19" x2="32" y2="23" />
		</g>
		<!-- Right Drop -->
		<g opacity="0">
			<animateTransform attributeName="transform" type="translate" values="0 0; 0 24" keyTimes="0; 1" keySplines="0.4 0 1 1" calcMode="spline" dur="1.2s" repeatCount="indefinite" begin="0.8s"/>
			<animate attributeName="opacity" values="0; 1; 1; 0" keyTimes="0; 0.1; 0.7; 1" dur="1.2s" repeatCount="indefinite" begin="0.8s"/>
			<line x1="37" y1="18" x2="37" y2="22" />
		</g>
	</g>

	<!-- 3. TALLER GAUGE CONTAINER -->
	
	<!-- Inner frosted glass background -->
	<path d="M 22 22 V 52 A 10 10 0 0 0 42 52 V 22" fill="url(#glassGrad)" />

	<!-- Animated Water Layer (Masked to the inside of the glass) -->
	<g clip-path="url(#gaugeClip)" opacity="0.9">
		<!-- Vertical Rise/Fall Animation - Fills to the 3rd tickmark from the bottom (Y=42) -->
		<g>
			<animateTransform attributeName="transform" type="translate" 
				values="0 56; 0 32; 0 32; 0 56" 
				keyTimes="0; 0.4; 0.7; 1" 
				keySplines="0.4 0 0.2 1; 1 0 1 1; 0.4 0 0.2 1" 
				calcMode="spline" 
				dur="8s" repeatCount="indefinite" />
			
			<!-- Horizontal Continuous Wave Animation -->
			<g>
				<animateTransform attributeName="transform" type="translate" 
					values="0 0; -20 0" 
					dur="1.5s" repeatCount="indefinite" />
				
				<!-- Mathematically perfect repeating wave path -->
				<path d="M 0 10 Q 5 7.5 10 10 T 20 10 T 30 10 T 40 10 T 50 10 T 60 10 T 70 10 T 80 10 V 55 H 0 Z" fill="url(#waterGrad)" />
			</g>
		</g>
	</g>

	<!-- Inner left highlight for premium 3D glass feeling -->
	<path d="M 25 24 V 52" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

	<!-- Outer Glass Stroke Overlay -->
	<path d="M 22 22 V 52 A 10 10 0 0 0 42 52 V 22" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
	
	<!-- Measurement Ticks (7 Total - Spaced evenly by 5 units) -->
	<path d="M 17 22 h 5 M 17 27 h 5 M 17 32 h 5 M 17 37 h 5 M 17 42 h 5 M 17 47 h 5 M 17 52 h 5" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" />

</svg>