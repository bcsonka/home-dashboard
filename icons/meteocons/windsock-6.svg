<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <!-- Soft Drop Shadow for Depth -->
        <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
            <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#041246" flood-opacity="0.15"/>
        </filter>
        
        <!-- Pole Gradient (Smooth Silver) -->
        <linearGradient id="poleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#cbd5e1"/>
            <stop offset="50%" stop-color="#f8fafc"/>
            <stop offset="100%" stop-color="#94a3b8"/>
        </linearGradient>

        <!-- 
            NEW: Inner Hole Gradient 
            Fills the empty space in the hoop. Starts bright red on the left side 
            and smoothly recedes into deep dark shadow on the right.
        -->
        <linearGradient id="innerHoleGrad" x1="14" y1="0" x2="22" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ef4444"/>
            <stop offset="40%" stop-color="#dc2626"/>
            <stop offset="100%" stop-color="#7f1d1d"/>
        </linearGradient>

        <!-- ANTI-ALIASED 5-STRIPE GRADIENT -->
        <linearGradient id="stripePattern" x1="18" y1="0" x2="58" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ef4444"/>
            <stop offset="19.5%" stop-color="#ef4444"/>
            <stop offset="20.5%" stop-color="#f8fafc"/>
            <stop offset="39.5%" stop-color="#f8fafc"/>
            <stop offset="40.5%" stop-color="#ef4444"/>
            <stop offset="59.5%" stop-color="#ef4444"/>
            <stop offset="60.5%" stop-color="#f8fafc"/>
            <stop offset="79.5%" stop-color="#f8fafc"/>
            <stop offset="80.5%" stop-color="#ef4444"/>
            <stop offset="100%" stop-color="#ef4444"/>
        </linearGradient>

        <!-- 3D Fabric Cylinder Shading Overlay -->
        <linearGradient id="fabricShine" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
            <stop offset="25%" stop-color="#ffffff" stop-opacity="0.1"/>
            <stop offset="70%" stop-color="#000000" stop-opacity="0.1"/>
            <stop offset="100%" stop-color="#000000" stop-opacity="0.4"/>
        </linearGradient>
    </defs>

    <!-- MAIN WINDSOCK ASSEMBLY -->
    <g filter="url(#softShadow)">
        
        <!-- Pole Base Shadow -->
        <ellipse cx="14" cy="56" rx="6" ry="1.5" fill="#041246" opacity="0.2"/>

        <!-- Silver Pole -->
        <rect x="12" y="14" width="4" height="42" rx="2" fill="url(#poleGrad)"/>
        <!-- Pole Top Cap -->
        <circle cx="14" cy="14" r="3" fill="url(#poleGrad)"/>
        <!-- Mounting Arm -->
        <rect x="14" y="16.5" width="4" height="3" fill="#94a3b8"/>

        <!-- Animated Windsock -->
        <g>
            <!-- Gentle structural bobbing -->
            <animateTransform 
                attributeName="transform" 
                type="rotate" 
                values="-1 18 18; 2 18 18; -1 18 18" 
                dur="2.5s" 
                calcMode="spline" 
                keySplines="0.42 0 0.58 1; 0.42 0 0.58 1" 
                repeatCount="indefinite"/>
            
            <!-- Mounting Ring (Now fully 3D filled) -->
            <ellipse cx="18" cy="18" rx="4" ry="9" fill="url(#innerHoleGrad)" stroke="#94a3b8" stroke-width="2"/>

            <!-- Dark Inside Hole of the Windsock -->
            <path d="M 18 10 A 3 8 0 0 1 18 26 Z" fill="#7f1d1d"/>

            <!-- 
                NEW: Dark Inner Tail Hole
                Drawn behind the main fabric. It forms the back inner wall of the tube, 
                stretching and warping to perfectly match the rapid whip animation.
            -->
            <path fill="#450a0a">
                <animate attributeName="d"
                    values="
                        M 58 22 A 1.5 4 0 0 0 58 14 A 1.5 4 0 0 1 58 22 Z;
                        M 58 25 A 1.5 3 0 0 0 58 16 A 1.5 3 0 0 1 58 25 Z;
                        M 57 26 A 1.5 4 0 0 0 57 17 A 1.5 4 0 0 1 57 26 Z;
                        M 59 18 A 1.5 2.5 0 0 0 59 11 A 1.5 2.5 0 0 1 59 18 Z;
                        M 58 20 A 1.5 4.5 0 0 0 58 12 A 1.5 4.5 0 0 1 58 20 Z;
                        M 58 22 A 1.5 4 0 0 0 58 14 A 1.5 4 0 0 1 58 22 Z
                    "
                    dur="0.75s"
                    repeatCount="indefinite" />
            </path>

            <!-- FABRIC LAYER - BASE STRIPES -->
            <path fill="url(#stripePattern)">
                <animate attributeName="d"
                    values="
                        M 18 10 A 3 8 0 0 0 18 26 C 28 26, 43 24, 58 22 A 1.5 4 0 0 0 58 14 C 43 12, 28 10, 18 10 Z;
                        M 18 10 A 3 8 0 0 0 18 26 C 28 26.5, 43 27, 58 25 A 1.5 3 0 0 0 58 16 C 43 14, 28 10.5, 18 10 Z;
                        M 18 10 A 3 8 0 0 0 18 26 C 28 25.5, 43 27, 57 26 A 1.5 4 0 0 0 57 17 C 43 11, 28 9.5, 18 10 Z;
                        M 18 10 A 3 8 0 0 0 18 26 C 28 25, 43 19, 59 18 A 1.5 2.5 0 0 0 59 11 C 43 10, 28 10.5, 18 10 Z;
                        M 18 10 A 3 8 0 0 0 18 26 C 28 26.5, 43 23, 58 20 A 1.5 4.5 0 0 0 58 12 C 43 14, 28 10, 18 10 Z;
                        M 18 10 A 3 8 0 0 0 18 26 C 28 26, 43 24, 58 22 A 1.5 4 0 0 0 58 14 C 43 12, 28 10, 18 10 Z
                    "
                    dur="0.75s"
                    repeatCount="indefinite" />
            </path>

            <!-- FABRIC LAYER - 3D SHADING OVERLAY -->
            <path fill="url(#fabricShine)">
                <animate attributeName="d"
                    values="
                        M 18 10 A 3 8 0 0 0 18 26 C 28 26, 43 24, 58 22 A 1.5 4 0 0 0 58 14 C 43 12, 28 10, 18 10 Z;
                        M 18 10 A 3 8 0 0 0 18 26 C 28 26.5, 43 27, 58 25 A 1.5 3 0 0 0 58 16 C 43 14, 28 10.5, 18 10 Z;
                        M 18 10 A 3 8 0 0 0 18 26 C 28 25.5, 43 27, 57 26 A 1.5 4 0 0 0 57 17 C 43 11, 28 9.5, 18 10 Z;
                        M 18 10 A 3 8 0 0 0 18 26 C 28 25, 43 19, 59 18 A 1.5 2.5 0 0 0 59 11 C 43 10, 28 10.5, 18 10 Z;
                        M 18 10 A 3 8 0 0 0 18 26 C 28 26.5, 43 23, 58 20 A 1.5 4.5 0 0 0 58 12 C 43 14, 28 10, 18 10 Z;
                        M 18 10 A 3 8 0 0 0 18 26 C 28 26, 43 24, 58 22 A 1.5 4 0 0 0 58 14 C 43 12, 28 10, 18 10 Z
                    "
                    dur="0.75s"
                    repeatCount="indefinite" />
            </path>
            
            <!-- Front Hem / Lip of the Mount -->
            <path d="M 18 10 A 3 8 0 0 0 18 26" fill="none" stroke="#fca5a5" stroke-width="1.2"/>

            <!-- 
                NEW: Tail Hem Highlight 
                A subtle, thin light stroke overlaid on the trailing edge.
            -->
            <path fill="none" stroke="#fca5a5" stroke-width="0.8" opacity="0.8">
                <animate attributeName="d"
                    values="
                        M 58 22 A 1.5 4 0 0 0 58 14;
                        M 58 25 A 1.5 3 0 0 0 58 16;
                        M 57 26 A 1.5 4 0 0 0 57 17;
                        M 59 18 A 1.5 2.5 0 0 0 59 11;
                        M 58 20 A 1.5 4.5 0 0 0 58 12;
                        M 58 22 A 1.5 4 0 0 0 58 14
                    "
                    dur="0.75s"
                    repeatCount="indefinite" />
            </path>
        </g>
    </g>
</svg>